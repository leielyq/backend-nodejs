name: echo_sys_info

on:
  workflow_dispatch:

jobs:
  windows_info:
    name: Windows system info
    runs-on: windows-latest
    steps:
      - name: Run script
        shell: pwsh
        run: |
          systeminfo
          git --version
          node --version
          npm --version

  linux_info:
    name: Linux system info
    runs-on: ubuntu-latest
    steps:
      - name: Run script
        run: |
          uname -a
          git --version
          node --version
          npm --version
