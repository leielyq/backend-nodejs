name: build nodejs v16 withssl

on:
  workflow_dispatch:
    inputs:
      tag_date:
        description: 'tag date'
        required: true

env:
  VERSION: 16.16.0
  NODE_MODULE_VERSION: 93
  OUTPUT_DIR: nodejs_16

jobs:
  build_windows:
    name: Windows
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'
      - name: Select latest MSVC toolset
        shell: pwsh
        run: .\node-script\ensure_msvc_toolset.ps1
      - name: npm install
        shell: bash
        run: npm install
      - name: Run build script
        shell: cmd
        run: |
          cd %GITHUB_WORKSPACE%
          call .\windows_trybuild.cmd ${{ env.VERSION }}
      - name: Run upload script
        shell: cmd
        run: |
          cd %GITHUB_WORKSPACE%
          call .\windows_64.cmd
      - name: Rename
        shell: bash
        run: mv puerts-node/nodejs puerts-node/${{ env.OUTPUT_DIR }}
      - uses: actions/upload-artifact@v4
        with:
          name: nodejs_bin_win_x64
          path: puerts-node/**/*

  build_windows_32:
    name: Windows-32
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'
      - name: Select latest MSVC toolset
        shell: pwsh
        run: .\node-script\ensure_msvc_toolset.ps1
      - name: npm install
        shell: bash
        run: npm install
      - name: Run build script
        shell: cmd
        run: |
          cd %GITHUB_WORKSPACE%
          call .\windows_trybuild.cmd ${{ env.VERSION }}
      - name: Run upload script
        shell: cmd
        run: |
          cd %GITHUB_WORKSPACE%
          call .\windows_32.cmd
      - name: Rename
        shell: bash
        run: mv puerts-node/nodejs puerts-node/${{ env.OUTPUT_DIR }}
      - uses: actions/upload-artifact@v4
        with:
          name: nodejs_bin_win_x86
          path: puerts-node/**/*

  build_linux:
    name: Linux
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'
      - name: Install Linux build dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y libc++-dev libc++abi-dev
      - name: npm install
        shell: bash
        run: npm install
      - name: Run build script
        run: |
          cd $GITHUB_WORKSPACE
          sh ./linux.sh ${{ env.VERSION }}
      - name: Rename
        run: |
          mv ~/puerts-node/nodejs ~/puerts-node/${{ env.OUTPUT_DIR }}
          sed "s/\${NODE_MODULE_VERSION}/${{ env.NODE_MODULE_VERSION }}/g" "$GITHUB_WORKSPACE/puer-build.json" > ~/puerts-node/${{ env.OUTPUT_DIR }}/puer-build.json
      - uses: actions/upload-artifact@v4
        with:
          name: nodejs_bin_linux_x64
          path: ~/puerts-node/**/*

  publish:
    runs-on: ubuntu-latest
    needs: [build_windows, build_windows_32, build_linux]
    steps:
      - uses: actions/download-artifact@v4
        with:
          path: nodejs_bin/
          merge-multiple: true
      - name: Create Release Asset
        run: |
          cd nodejs_bin/ && tar cvfz ../nodejs_bin_${{ env.VERSION }}.tgz ${{ env.OUTPUT_DIR }} && cd -
      - name: Remove Existing Release
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          RELEASE_TAG: NodeJS_${{ env.VERSION }}_ssl_${{ github.event.inputs.tag_date }}
        run: |
          set -euo pipefail
          echo "Preparing release tag ${RELEASE_TAG}"
          if gh release view "${RELEASE_TAG}" >/dev/null 2>&1; then
            echo "Deleting existing release ${RELEASE_TAG}"
            gh release delete "${RELEASE_TAG}" --yes --cleanup-tag
          else
            echo "No existing release named ${RELEASE_TAG}"
          fi
          if gh api "repos/${GITHUB_REPOSITORY}/git/ref/tags/${RELEASE_TAG}" >/dev/null 2>&1; then
            echo "Deleting existing git tag ${RELEASE_TAG}"
            gh api --method DELETE "repos/${GITHUB_REPOSITORY}/git/refs/tags/${RELEASE_TAG}"
          else
            echo "No existing git tag named ${RELEASE_TAG}"
          fi
      - name: Create Release
        id: create_release
        uses: actions/create-release@v1
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        with:
          tag_name: NodeJS_${{ env.VERSION }}_ssl_${{ github.event.inputs.tag_date }}
          release_name: NodeJS_${{ env.VERSION }}(with ssl)_${{ github.event.inputs.tag_date }}
          draft: false
          prerelease: false
      - name: Upload nodejs_bin
        uses: actions/upload-release-asset@v1
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        with:
          upload_url: ${{ steps.create_release.outputs.upload_url }}
          asset_path: ./nodejs_bin_${{ env.VERSION }}.tgz
          asset_name: nodejs_bin_${{ env.VERSION }}.tgz
          asset_content_type: application/tgz
